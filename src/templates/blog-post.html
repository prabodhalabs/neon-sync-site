<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} | Neon Sync Blog</title>
    <meta name="description" content="{{DESCRIPTION}}">
    
    <!-- Open Graph for social sharing -->
    <meta property="og:title" content="{{TITLE}}">
    <meta property="og:description" content="{{DESCRIPTION}}">
    <meta property="og:type" content="article">
    <meta property="article:published_time" content="{{DATE_ISO}}">

    <link rel="stylesheet" href="/neon-sync-site/style.css">
    <link rel="stylesheet" href="/neon-sync-site/blog.css">
    <link rel="icon" type="image/png" href="/neon-sync-site/icon.png">
</head>
<body>
    <nav class="nav">
        <div class="container">
            <a href="/neon-sync-site/index.html" class="nav-brand">
                <div class="dot"></div> NEONSYNC
            </a>
            <ul class="nav-links">
                <li><a href="/neon-sync-site/blog/">Blog</a></li>
            </ul>
        </div>
    </nav>
    
    <article class="post-container">
        <a href="/neon-sync-site/blog/" class="back-link">← Back to Blog</a>
        
        <header class="post-header">
            <h1>{{TITLE}}</h1>
            <div class="post-meta-full">
                <time datetime="{{DATE_ISO}}">{{DATE}}</time>
                <span>&bull;</span>
                <span>{{READING_TIME}} min read</span>
                <span>&bull;</span>
                <div class="blog-tags">
                    {{TAGS}}
                </div>
            </div>
        </header>

        <div class="post-content">
            {{CONTENT}}
        </div>

        <div class="post-footer-cta">
            <h3>Ready to test your mind?</h3>
            <p>Try Neon Sync, the minimalistic puzzle game designed to sharpen your thinking.</p>
            <a href="https://play.google.com/store/apps/details?id=com.neonsync.game" class="badge-cta">
                <img style="height: 50px;" src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" alt="Get it on Google Play">
            </a>
        </div>
    </article>

    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="/neon-sync-site/privacy.html">Privacy</a>
                <a href="/neon-sync-site/terms.html">Terms</a>
                <a href="/neon-sync-site/support.html">Support</a>
                <a href="/neon-sync-site/data-deletion.html">Data Deletion</a>
            </div>
            <p class="copyright">&copy; <script>document.write(new Date().getFullYear())</script> Prabodha Labs. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
